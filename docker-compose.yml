services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: transparency
      POSTGRES_USER: transparency
      POSTGRES_PASSWORD: transparency
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transparency -d transparency"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: demo,local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/transparency
      SPRING_DATASOURCE_USERNAME: transparency
      SPRING_DATASOURCE_PASSWORD: transparency
      DEMO_ORGANIZER_PASSWORD: demo123
      APP_UPLOAD_DIR: /app/data/uploads
    volumes:
      - uploads_data:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
