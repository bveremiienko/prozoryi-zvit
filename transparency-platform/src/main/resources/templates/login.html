<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('Вхід', ~{::section})}">
<section th:fragment="section">
    <div class="login-box card">
        <h2>Кабінет організатора</h2>
        <p style="color:var(--muted); font-size:0.9rem">Демо: organizer@demo.local / demo123</p>
        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="username" required autocomplete="username"/>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" required autocomplete="current-password"/>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Увійти</button>
        </form>
        <p th:if="${param.error}" class="alert alert-error" style="margin-top:1rem">Невірний email або пароль</p>
    </div>
</section>
</html>
