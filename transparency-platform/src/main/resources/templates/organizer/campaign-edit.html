<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('Редагування', ~{::section})}">
<section th:fragment="section" th:with="c=${detail.campaign}">
    <h1>Редагування кампанії</h1>
    <p>
        <a th:href="@{/campaigns/{slug}(slug=${c.slug})}">Публічна сторінка</a> ·
        <a th:href="@{/organizer/campaigns/{id}/plan(id=${c.id})}">План витрат</a> ·
        <a th:href="@{/organizer/campaigns/{id}/reports/new(id=${c.id})}">Новий звіт</a>
    </p>
    <form th:action="@{/organizer/campaigns/{id}/edit(id=${c.id})}" method="post" class="card" style="max-width:600px">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group">
            <label>Назва *</label>
            <input name="title" th:value="${c.title}" required/>
        </div>
        <div class="form-group">
            <label>Опис</label>
            <textarea name="description" rows="4" th:text="${c.description}"></textarea>
        </div>
        <div class="form-group" th:if="${c.organizerSlug != null}">
            <label>Організатор</label>
            <p style="margin:0">
                <a th:href="@{/organizers/{slug}(slug=${c.organizerSlug})}" th:text="${c.organizerName}">Org</a>
                <span th:if="${c.edrpou != null}"> · ЄДРПОУ <span th:text="${c.edrpou}">0</span></span>
            </p>
        </div>
        <div class="form-group">
            <label>Цільова сума (₴)</label>
            <input name="targetAmount" type="number" step="0.01" th:value="${c.targetAmount}"/>
        </div>
        <div class="form-group">
            <label>Зібрано (декларовано, ₴)</label>
            <input name="declaredCollectedAmount" type="number" step="0.01" th:value="${c.declaredCollectedAmount}"/>
        </div>
        <div class="form-group">
            <label>Посилання на збір</label>
            <input name="externalDonationUrl" type="url" th:value="${c.externalDonationUrl}"/>
        </div>
        <div class="form-group">
            <label>Сайт</label>
            <input name="externalWebsiteUrl" type="url" th:value="${c.externalWebsiteUrl}"/>
        </div>
        <div class="form-group">
            <label>Дата старту</label>
            <input name="startedAt" type="date" th:value="${c.startedAt}"/>
        </div>
        <div class="form-group">
            <label>Наступний звіт до</label>
            <input name="nextReportDue" type="date" th:value="${c.nextReportDue}"/>
        </div>
        <div class="form-group">
            <label>Статус</label>
            <select name="status">
                <option th:each="st : ${statuses}" th:value="${st}" th:text="${st}"
                        th:selected="${st == c.status}">ACTIVE</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Зберегти</button>
    </form>
</section>
</html>
