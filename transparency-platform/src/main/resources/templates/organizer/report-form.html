<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('Новий звіт', ~{::section})}">
<section th:fragment="section">
    <h1>Новий звіт</h1>
    <p th:text="${campaign.title}">Campaign</p>
    <form th:action="@{/organizer/campaigns/{id}/reports(id=${campaign.id})}" method="post"
          enctype="multipart/form-data" class="card" style="max-width:720px">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group">
            <label>Період з</label>
            <input name="periodFrom" type="date" required/>
        </div>
        <div class="form-group">
            <label>Період по</label>
            <input name="periodTo" type="date" required/>
        </div>
        <div class="form-group">
            <label>Опис звіту *</label>
            <textarea name="summary" rows="5" required></textarea>
        </div>

        <h3>Витрати за категоріями</h3>
        <div id="expense-lines">
            <div class="expense-line-row card" style="padding:1rem; margin-bottom:0.75rem">
                <div class="form-group">
                    <label>Категорія</label>
                    <select name="lineCategory">
                        <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat.labelUk}">Cat</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Сума (₴)</label>
                    <input name="lineAmount" type="number" step="0.01" min="0"/>
                </div>
                <div class="form-group">
                    <label>Опис</label>
                    <input name="lineDescription" type="text"/>
                </div>
            </div>
            <div class="expense-line-row card" style="padding:1rem; margin-bottom:0.75rem">
                <div class="form-group">
                    <label>Категорія</label>
                    <select name="lineCategory">
                        <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat.labelUk}">Cat</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Сума (₴)</label>
                    <input name="lineAmount" type="number" step="0.01" min="0"/>
                </div>
                <div class="form-group">
                    <label>Опис</label>
                    <input name="lineDescription" type="text"/>
                </div>
            </div>
        </div>
        <button type="button" class="btn btn-outline" onclick="addExpenseLine()" style="margin-bottom:1rem">+ Ще один рядок</button>

        <div class="form-group">
            <label>Вкладення (pdf, jpg, png)</label>
            <input name="attachment" type="file" accept=".pdf,.jpg,.jpeg,.png"/>
        </div>
        <button type="submit" class="btn btn-primary">Опублікувати звіт</button>
    </form>
    <script th:src="@{/js/demo.js}"></script>
</section>
</html>
