<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('План витрат', ~{::section})}">
<section th:fragment="section" th:with="c=${detail.campaign}">
    <h1>План витрат</h1>
    <p th:text="${c.title}">Campaign</p>
    <p><a th:href="@{/organizer/campaigns/{id}/edit(id=${c.id})}">← Назад</a></p>

    <div class="card">
        <table th:if="${!#lists.isEmpty(detail.planLines)}">
            <tr th:each="line : ${detail.planLines}">
                <td th:text="${line.category.labelUk}">Cat</td>
                <td th:text="${#numbers.formatDecimal(line.plannedAmount, 0, 'COMMA', 0, 'POINT')} + ' ₴'">0</td>
                <td th:text="${line.note}">note</td>
                <td>
                    <form th:action="@{/organizer/campaigns/{cid}/plan/{lid}/delete(cid=${c.id}, lid=${line.id})}"
                          method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-outline" style="padding:0.25rem 0.5rem;font-size:0.8rem">×</button>
                    </form>
                </td>
            </tr>
        </table>
    </div>

    <div class="card" style="max-width:500px">
        <h3>Додати рядок</h3>
        <form th:action="@{/organizer/campaigns/{id}/plan(id=${c.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label>Категорія</label>
                <select name="category">
                    <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat.labelUk}">Cat</option>
                </select>
            </div>
            <div class="form-group">
                <label>Сума (₴)</label>
                <input name="plannedAmount" type="number" step="0.01" required/>
            </div>
            <div class="form-group">
                <label>Примітка</label>
                <input name="note"/>
            </div>
            <button type="submit" class="btn btn-primary">Додати</button>
        </form>
    </div>
</section>
</html>
