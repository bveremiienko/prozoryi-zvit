<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('Нова кампанія', ~{::section})}">
<section th:fragment="section">
    <h1>Нова кампанія</h1>
    <div class="card" style="max-width:600px; margin-bottom:1rem" th:if="${organization != null}">
        <p style="margin:0"><strong>Організація:</strong>
            <a th:href="@{/organizers/{slug}(slug=${organization.slug})}" th:text="${organization.name}">Org</a>
            <span th:if="${organization.edrpou != null}"> · ЄДРПОУ <span th:text="${organization.edrpou}">0</span></span>
        </p>
        <p style="color:var(--muted); font-size:0.85rem; margin:0.5rem 0 0">
            Назву та реквізити організатора беремо з вашого профілю.
        </p>
    </div>
    <form th:action="@{/organizer/campaigns}" method="post" class="card" style="max-width:600px">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group">
            <label>Назва *</label>
            <input name="title" required/>
        </div>
        <div class="form-group">
            <label>Опис</label>
            <textarea name="description" rows="4"></textarea>
        </div>
        <div class="form-group">
            <label>Цільова сума (₴)</label>
            <input name="targetAmount" type="number" step="0.01"/>
        </div>
        <div class="form-group">
            <label>Посилання на збір</label>
            <input name="externalDonationUrl" type="url"/>
        </div>
        <div class="form-group">
            <label>Сайт</label>
            <input name="externalWebsiteUrl" type="url"/>
        </div>
        <div class="form-group">
            <label>Дата старту</label>
            <input name="startedAt" type="date"/>
        </div>
        <div class="form-group">
            <label>Наступний звіт до</label>
            <input name="nextReportDue" type="date"/>
        </div>
        <button type="submit" class="btn btn-primary">Створити</button>
    </form>
</section>
</html>
